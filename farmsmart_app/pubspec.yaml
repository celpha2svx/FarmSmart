name: farmsmart_app
description: FarmSmart — Precision Agriculture for Nigerian Farmers
publish_to: 'none'
version: 1.0.1+2

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Local database (offline-first)
  drift: ^2.19.0
  sqlite3_flutter_libs: ^0.5.0
  path_provider: ^2.1.2
  path: ^1.9.0

  # Networking
  dio: ^5.4.3+1
  connectivity_plus: ^6.0.3
  flutter_cache_manager: ^3.3.2

  # Location & Maps
  geolocator: ^14.0.2
  geocoding: ^3.0.0
  flutter_map: ^7.0.2
  latlong2: ^0.9.0

  # Camera & Image (AI pest detection)
  camera: ^0.11.0+1
  image_picker: ^1.1.1
  tflite_flutter: 0.10.4
  image: ^4.2.0

  # UI & Charts
  fl_chart: ^0.68.0
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  lottie: ^3.1.2

  # Localization
  flutter_localizations:
    sdk: flutter
  intl: ^0.19.0

  # Utilities
  intl_phone_number_input: ^0.7.5
  url_launcher: ^6.2.6
  flutter_secure_storage: ^9.2.2
  permission_handler: ^11.3.1
  package_info_plus: ^8.0.0
  device_info_plus: ^10.1.2
  uuid: ^4.4.0
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  drift_dev: ^2.19.0
  build_runner: ^2.4.9
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.0
  mockito: ^5.4.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/l10n/
    - assets/models/  # TFLite models for pest detection

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter.ttc
          weight: 400
        - asset: assets/fonts/Inter.ttc
          weight: 500
        - asset: assets/fonts/Inter.ttc
          weight: 600
        - asset: assets/fonts/Inter.ttc
          weight: 700
