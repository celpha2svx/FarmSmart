name: farmsmart
description: Advisory app for Nigerian smallholder farmers
publish_to: 'none'
version: 2.0.0+3

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Fonts
  google_fonts: ^6.2.1

  # Navigation
  go_router: ^13.2.0

  # Networking
  dio: ^5.4.3+1

  # Local storage
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.3

  # Database (Drift)
  drift: ^2.18.0
  sqlite3_flutter_libs: ^0.5.22
  path_provider: ^2.1.3
  path: ^1.9.0

  # Calendar
  table_calendar: ^3.1.1

  # Charts
  fl_chart: ^0.67.0

  # Camera / Image
  image_picker: ^1.1.1
  camera: ^0.10.5+9

  # OTP input
  pinput: ^3.0.1

  # Connectivity
  connectivity_plus: ^6.0.3

  # Shimmer loading
  shimmer: ^3.0.0

  # HTTP download (OTA update)
  package_info_plus: ^8.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.9
  drift_dev: ^2.18.0
  riverpod_generator: ^2.4.0

flutter:
  uses-material-design: true
