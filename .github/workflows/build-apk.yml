name: Build FarmSmart APK

on:
  push:
    tags:
      - 'v*'  # Triggers on tags like v1.0.0, v1.1.0, etc.
  workflow_dispatch:       # Manual trigger from Actions tab
    inputs:
      version:
        description: 'Version name (e.g. 1.0.0)'
        required: true
        default: '1.0.0'

jobs:
  build:
    name: Build Flutter APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: farmsmart_app

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.x'
          channel: 'stable'

      - name: Cache Flutter dependencies
        uses: actions/cache@v4
        with:
          path: /opt/hostedtoolcache/flutter
          key: flutter-${{ hashFiles('farmsmart_app/pubspec.lock') }}

      - name: Install dependencies
        run: flutter pub get

      - name: Generate platform folders (android, ios, etc.)
        run: flutter create --platforms android .

      - name: Generate Drift code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Run tests
        run: flutter test --no-pub

      - name: Build release APK
        run: flutter build apk --release --split-per-abi

      - name: Build universal APK (fallback)
        run: flutter build apk --release

      - name: Get version name
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "FarmSmart v${{ steps.version.outputs.version }}"
          body_path: farmsmart_app/CHANGELOG.md
          files: |
            farmsmart_app/build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
            farmsmart_app/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            farmsmart_app/build/app/outputs/flutter-apk/app-x86_64-release.apk
            farmsmart_app/build/app/outputs/flutter-apk/app-release.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update backend with latest release info
        run: |
          curl -X POST "https://farmsmart-dlou.onrender.com/api/version/release" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.ADMIN_TOKEN }}" \
            -d '{
              "version_name": "${{ steps.version.outputs.version }}",
              "version_code": ${{ github.run_number }},
              "apk_url": "https://github.com/${{ github.repository }}/releases/download/v${{ steps.version.outputs.version }}/app-release.apk",
              "changelog": "See GitHub release for details.",
              "mandatory": false
            }' || echo "Backend update skipped (not critical)"
