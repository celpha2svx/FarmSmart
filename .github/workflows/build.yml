name: Build & Release APK

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: farmsmart_app

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.0'
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos

      - name: Build release APK
        run: flutter build apk --release --dart-define=API_BASE_URL=https://farmsmart-dlou.onrender.com

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Rename APK
        run: |
          cp build/app/outputs/flutter-apk/app-release.apk \
             build/app/outputs/flutter-apk/FarmSmart-${{ steps.version.outputs.VERSION }}.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: farmsmart_app/build/app/outputs/flutter-apk/FarmSmart-${{ steps.version.outputs.VERSION }}.apk
          name: FarmSmart ${{ steps.version.outputs.VERSION }}
          body: |
            ## FarmSmart ${{ steps.version.outputs.VERSION }}

            ### Install
            1. Download `FarmSmart-${{ steps.version.outputs.VERSION }}.apk`
            2. On your Android phone, go to **Settings → Apps → Install unknown apps** and allow your file manager
            3. Open the downloaded APK and install

            ### What's new
            See commits for changes in this release.
          token: ${{ secrets.GITHUB_TOKEN }}

  notify_backend:
    runs-on: ubuntu-latest
    needs: build
    if: success()
    steps:
      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Notify backend of new release
        run: |
          curl -s -X POST https://farmsmart-dlou.onrender.com/api/version/release \
            -H "Content-Type: application/json" \
            -H "auth: Bearer ${{ secrets.FARMSMART_ADMIN_TOKEN }}" \
            -d '{
              "version_name": "${{ steps.version.outputs.VERSION }}",
              "version_code": ${{ github.run_number }},
              "apk_url": "https://github.com/${{ github.repository }}/releases/download/${{ steps.version.outputs.VERSION }}/FarmSmart-${{ steps.version.outputs.VERSION }}.apk",
              "changelog": "See GitHub release notes",
              "mandatory": false
            }' || true
